name: Deploy to Azure VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean remote source directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd /home/${{ secrets.AZURE_USER }}/economia
            rm -rf src/ frontend/

      - name: Copy files to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "src/,frontend/,docker/,sql/,scripts/,observability/"
          target: /home/${{ secrets.AZURE_USER }}/economia

      - name: Execute SQL migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd /home/${{ secrets.AZURE_USER }}/economia
            # Ejecutar scripts SQL pendientes dentro del contenedor
            for f in sql/*.sql; do
              BASENAME=$(basename "$f" .sql)
              DONE_FLAG="/home/${{ secrets.AZURE_USER }}/economia/.scripts_state/${BASENAME}.done"
              if [ ! -f "$DONE_FLAG" ]; then
                echo "Ejecutando $f..."
                docker exec -i economia-sqlserver /opt/mssql-tools18/bin/sqlcmd \
                  -S localhost -U sa -P '${{ secrets.SQL_PASSWORD }}' -C -i /dev/stdin < "$f" && \
                mkdir -p .scripts_state && touch "$DONE_FLAG"
              fi
            done

      - name: Build and deploy containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd /home/${{ secrets.AZURE_USER }}/economia

            # Create .env with LLM secrets for docker compose
            cat > docker/.env <<'ENVEOF'
            AZURE_OPENAI_API_KEY0=${{ secrets.AZURE_OPENAI_API_KEY0 }}
            AZURE_OPENAI_ENDPOINT0=${{ secrets.AZURE_OPENAI_ENDPOINT0 }}
            AZURE_OPENAI_DEPLOYMENT0=gpt-5.5
            AZURE_OPENAI_API_VERSION0=2024-08-01-preview
            CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
            CLAUDE_ENDPOINT=${{ secrets.CLAUDE_ENDPOINT }}
            CLAUDE_MODEL1=claude-opus-4-7
            ENVEOF
            sed -i 's/^            //' docker/.env

            docker compose -f docker/docker-compose.azure.yml --env-file docker/.env --profile db --profile core --profile kafka build --no-cache

            # Levantar infra (db, kafka, redis) — sin force-recreate (son imágenes externas)
            docker compose -f docker/docker-compose.azure.yml --env-file docker/.env --profile db --profile core --profile kafka up -d --wait

            # Recrear solo los servicios de app (no infra) para usar imágenes nuevas
            docker compose -f docker/docker-compose.azure.yml --env-file docker/.env --profile db --profile core --profile kafka up -d --force-recreate --no-deps economia-api economia-frontend economia-llm
            
            # Esperar a que estén healthy
            docker compose -f docker/docker-compose.azure.yml --env-file docker/.env --profile db --profile core --profile kafka up -d --wait

            docker image prune -f
            echo "Deploy completado: $(date)"
