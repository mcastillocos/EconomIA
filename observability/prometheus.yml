global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'economia-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['economia-api:5000']
    scrape_interval: 10s
