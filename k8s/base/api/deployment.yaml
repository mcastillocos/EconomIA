apiVersion: apps/v1
kind: Deployment
metadata:
  name: economia-api
  namespace: economia
  labels:
    app: economia-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: economia-api
  template:
    metadata:
      labels:
        app: economia-api
    spec:
      containers:
        - name: api
          image: economia-registry:5050/economia-api:latest
          ports:
            - containerPort: 5000
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ConnectionStrings__SqlServer
              valueFrom:
                secretKeyRef:
                  name: economia-secrets
                  key: sql-connection-string
            - name: ConnectionStrings__Redis
              value: "redis-service:6379"
            - name: Kafka__BootstrapServers
              value: "kafka-service:9092"
            - name: OpenTelemetry__OtlpEndpoint
              value: "http://otel-collector-service:4317"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: economia-api-service
  namespace: economia
spec:
  selector:
    app: economia-api
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: economia-api-hpa
  namespace: economia
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: economia-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
