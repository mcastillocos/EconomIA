apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: economia
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/rules/*.yml
    scrape_configs:
      - job_name: 'economia-api'
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['economia']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: economia-api
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            target_label: __address__
            regex: (.+)
            replacement: ${1}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: economia
data:
  alert-rules.yml: |
    groups:
      - name: economia-api
        rules:
          - alert: HighErrorRate
            expr: |
              sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m]))
              / sum(rate(http_server_request_duration_seconds_count[5m]))
              > 0.05
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Alta tasa de errores HTTP (>5%)"
          - alert: ApiDown
            expr: up{job="economia-api"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "economia-api no responde"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: economia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.50.0
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-rules
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: economia
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
