apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: economia
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: economia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: vault
      containers:
        - name: vault
          image: hashicorp/vault:1.15
          ports:
            - containerPort: 8200
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              valueFrom:
                secretKeyRef:
                  name: economia-secrets
                  key: vault-token
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
          args: ["server", "-dev"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vault-service
  namespace: economia
spec:
  selector:
    app: vault
  ports:
    - port: 8200
      targetPort: 8200
---
# External Secrets Operator - SecretStore pointing to Vault
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: economia
spec:
  provider:
    vault:
      server: "http://vault-service:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: economia-secrets
          key: vault-token
---
# ExternalSecret: syncs Vault secrets → K8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: economia-db-credentials
  namespace: economia
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: economia-db-secret
    creationPolicy: Owner
  data:
    - secretKey: connection-string
      remoteRef:
        key: economia/database
        property: connection-string
    - secretKey: redis-connection
      remoteRef:
        key: economia/redis
        property: connection-string
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: economia-api-keys
  namespace: economia
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: economia-api-keys-secret
    creationPolicy: Owner
  data:
    - secretKey: llm-api-key
      remoteRef:
        key: economia/llm
        property: api-key
    - secretKey: grafana-admin-password
      remoteRef:
        key: economia/grafana
        property: admin-password
