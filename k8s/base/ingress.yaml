apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: economia-ingress
  namespace: economia
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: economia.localhost
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: economia-api-service
                port:
                  number: 5000
          - path: /hubs
            pathType: Prefix
            backend:
              service:
                name: economia-api-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: economia-frontend-service
                port:
                  number: 80
    - host: grafana.economia.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana-service
                port:
                  number: 3000
