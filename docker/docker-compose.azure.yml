# docker-compose.azure.yml
# Perfil para Azure VM Standard_B2als_v2 (2 vCPU, 4 GB RAM)
# Uso: docker compose -f docker/docker-compose.azure.yml --profile core --profile kafka up -d
#
# PERFILES disponibles (usar con --profile):
#   - core:    API + Redis + Frontend (≈330 MB RAM)
#   - kafka:   Zookeeper + Kafka (≈550 MB RAM)
#   - db:      SQL Server (≈500 MB RAM)
#   - monitor: Prometheus + Grafana (≈300 MB RAM)

name: economia-azure

services:
  # ============ CORE (perfil por defecto) ============
  economia-api:
    image: economia-api:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: economia-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__SqlServer=Server=economia-sqlserver,1433;Database=EconomIA;User Id=sa;Password=EconomIA_Dev2024!;TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - Frontend__Url=http://20.203.185.54:3000
      - Kafka__BootstrapServers=kafka:29092
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 100M
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      - economia-net
    restart: unless-stopped
    profiles: ["core"]

  economia-frontend:
    image: economia-frontend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: economia-frontend
    ports:
      - "3000:80"
    deploy:
      resources:
        limits:
          memory: 50M
        reservations:
          memory: 20M
    depends_on:
      - economia-api
      - economia-llm
    networks:
      - economia-net
    restart: unless-stopped
    profiles: ["core"]

  economia-llm:
    image: economia-llm:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.llm
    container_name: economia-llm
    environment:
      - AZURE_OPENAI_API_KEY0=${AZURE_OPENAI_API_KEY0:-}
      - AZURE_OPENAI_ENDPOINT0=${AZURE_OPENAI_ENDPOINT0:-}
      - AZURE_OPENAI_DEPLOYMENT0=${AZURE_OPENAI_DEPLOYMENT0:-}
      - AZURE_OPENAI_API_VERSION0=${AZURE_OPENAI_API_VERSION0:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CLAUDE_ENDPOINT=${CLAUDE_ENDPOINT:-}
      - CLAUDE_MODEL1=${CLAUDE_MODEL1:-}
    volumes:
      - llm-state:/app/state
    deploy:
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 64M
    networks:
      - economia-net
    restart: unless-stopped
    profiles: ["core"]

  redis:
    image: redis:7-alpine
    container_name: economia-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 80M
        reservations:
          memory: 30M
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - economia-net
    restart: unless-stopped
    profiles: ["core"]

  # ============ KAFKA (perfil separado) ============
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: economia-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - economia-net
    restart: unless-stopped
    profiles: ["kafka"]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: economia-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    deploy:
      resources:
        limits:
          memory: 400M
        reservations:
          memory: 256M
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - economia-net
    restart: unless-stopped
    profiles: ["kafka"]

  # ============ DATABASE (perfil separado, pesado) ============
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: economia-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=EconomIA_Dev2024!
      - MSSQL_PID=Developer
      - MSSQL_MEMORY_LIMIT_MB=512
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1433' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - economia-net
    restart: unless-stopped
    profiles: ["db"]

  # ============ MONITORING (perfil separado) ============
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: economia-prometheus
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 80M
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../observability/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus-data:/prometheus
    networks:
      - economia-net
    restart: unless-stopped
    profiles: ["monitor"]

  grafana:
    image: grafana/grafana:10.3.1
    container_name: economia-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=economia
      - GF_USERS_ALLOW_SIGN_UP=false
    deploy:
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 80M
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - economia-net
    restart: unless-stopped
    profiles: ["monitor"]

volumes:
  redis-data:
  sqlserver-data:
  prometheus-data:
  grafana-data:
  llm-state:

networks:
  economia-net:
    driver: bridge
