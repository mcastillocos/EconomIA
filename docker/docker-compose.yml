version: '3.8'

services:
  # ============ APPLICATION ============
  economia-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: economia-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__SqlServer=Server=sqlserver,1433;Database=EconomIA;User Id=sa;Password=EconomIA_Dev2024!;TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - Kafka__BootstrapServers=kafka:29092
      - OpenTelemetry__OtlpEndpoint=http://otel-collector:4317
      - Frontend__Url=http://localhost:3000
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - economia-net
    restart: unless-stopped

  economia-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: economia-frontend
    ports:
      - "3000:80"
    depends_on:
      - economia-api
    networks:
      - economia-net
    restart: unless-stopped

  # ============ DATA STORES ============
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: economia-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=EconomIA_Dev2024!
      - MSSQL_PID=Developer
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "EconomIA_Dev2024!" -C -Q "SELECT 1" -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - economia-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: economia-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - economia-net
    restart: unless-stopped

  # ============ MESSAGING ============
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: economia-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - economia-net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: economia-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    healthcheck:
      test: kafka-topics --bootstrap-server kafka:29092 --list
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - economia-net
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: economia-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: economia
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - economia-net
    restart: unless-stopped

  # ============ SECRETS ============
  vault:
    image: hashicorp/vault:1.15
    container_name: economia-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: economia-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    networks:
      - economia-net
    restart: unless-stopped

  # ============ OBSERVABILITY ============
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: economia-otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ../observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - economia-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: economia-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - economia-net
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    container_name: economia-loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    networks:
      - economia-net
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.3.1
    container_name: economia-tempo
    ports:
      - "4320:4317"   # OTLP gRPC (internal)
      - "3200:3200"   # Tempo API
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ../observability/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/tmp/tempo
    networks:
      - economia-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.1
    container_name: economia-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=economia
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - economia-net
    restart: unless-stopped

volumes:
  sqlserver-data:
  redis-data:
  zookeeper-data:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:

networks:
  economia-net:
    driver: bridge
